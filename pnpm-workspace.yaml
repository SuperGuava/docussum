# pnpm 10+ : 의존성 install 스크립트 허용 (ERR_PNPM_IGNORED_BUILDS 방지)
# 패키지 추가 후 동일 오류가 나면: pnpm approve-builds
overrides:
  "@react-email/render": "2.0.8"
  next: "16.2.7"
  react: "19.2.6"
  react-dom: "19.2.6"
allowBuilds:
  "@google/genai": true
  esbuild: true
  protobufjs: true
  sharp: true
  msw: true
  unrs-resolver: true
